<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <!-- Bootstrap CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        /* Sidebar styling */
        .sidebar {
            height: 100vh;
            background: #212529;
            color: white;
            padding-top: 20px;
        }
        .sidebar a {
            color: #adb5bd;
            text-decoration: none;
            display: block;
            padding: 10px 20px;
        }
        .sidebar a:hover {
            background: #343a40;
            color: white;
        }
        /* Main content padding */
        .content {
            padding: 20px;
        }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row">
        <!-- Sidebar Column -->
        <nav class="col-md-3 col-lg-2 d-md-block sidebar collapse">
            <h4 class="text-center">Admin Panel</h4>
            <hr>
            <a href="#">Dashboard</a>
            <a href="#">Users</a>
            <a href="#">Analytics</a>
            <a href="#">Settings</a>
            <a href="#">Logout</a>
        </nav>

        <!-- Main Content Column -->
        <main class="col-md-9 ms-sm-auto col-lg-10 content">
            <h2 class="mb-4">Dashboard Statistics</h2>

            <!-- Statistics Cards Row -->
            <div class="row g-4">
                <!-- Card 1 -->
                <div class="col-12 col-sm-6 col-xl-3">
                    <div class="card text-white bg-primary shadow">
                        <div class="card-body text-center">
                            <h5 class="card-title">Total Users</h5>
                            <p class="card-text fs-2">1,250</p>
                        </div>
                    </div>
                </div>
                <!-- Card 2 -->
                <div class="col-12 col-sm-6 col-xl-3">
                    <div class="card text-white bg-success shadow">
                        <div class="card-body text-center">
                            <h5 class="card-title">Revenue</h5>
                            <p class="card-text fs-2">$4,500</p>
                        </div>
                    </div>
                </div>
                <!-- Card 3 -->
                <div class="col-12 col-sm-6 col-xl-3">
                    <div class="card text-white bg-warning shadow">
                        <div class="card-body text-center">
                            <h5 class="card-title">Active Exams</h5>
                            <p class="card-text fs-2">12</p>
                        </div>
                    </div>
                </div>
                <!-- Card 4 -->
                <div class="col-12 col-sm-6 col-xl-3">
                    <div class="card text-white bg-danger shadow">
                        <div class="card-body text-center">
                            <h5 class="card-title">Pending Tasks</h5>
                            <p class="card-text fs-2">5</p>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Optional: A simple table below for context -->
            <div class="mt-5">
                <h3>Recent Activity</h3>
                <table class="table table-striped table-hover mt-3 shadow-sm">
                    <thead class="table-dark">
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr><td>001</td><td>John Doe</td><td><span class="badge bg-success">Paid</span></td></tr>
                        <tr><td>002</td><td>Jane Smith</td><td><span class="badge bg-warning text-dark">Pending</span></td></tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
